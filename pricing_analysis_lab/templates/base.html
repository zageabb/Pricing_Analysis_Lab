<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pricing Analysis Lab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <div class="activity-banner" id="activity-banner" aria-live="polite" hidden>
      <span class="activity-dot"></span>
      <span id="activity-text">AI is working...</span>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">Pricing Analysis Lab</div>
        <nav>
          <a href="{{ url_for('analysis.home') }}">Analysis</a>
          <a href="{{ url_for('settings.index') }}">LLM Settings</a>
          <a href="{{ url_for('admin.prompts') }}">Prompt Manager</a>
          <a href="{{ url_for('workflow.index') }}">Workflow</a>
          <a href="{{ url_for('json_api.index') }}">JSON API</a>
          <a href="{{ url_for('history.index') }}">Run History</a>
          <a href="{{ url_for('api.health') }}">API Health</a>
        </nav>
      </aside>
      <main class="content">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
          <div class="flash-stack">
            {% for message in messages %}
            <div class="flash">{{ message }}</div>
            {% endfor %}
          </div>
          {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      (() => {
        const banner = document.getElementById("activity-banner");
        const bannerText = document.getElementById("activity-text");
        if (!banner || !bannerText) {
          return;
        }

        let busy = false;
        const setBusy = (active, label) => {
          busy = active;
          document.body.classList.toggle("app-busy", active);
          banner.hidden = !active;
          if (label) {
            bannerText.textContent = label;
          }
        };

        document.addEventListener("submit", (event) => {
          const form = event.target;
          if (!(form instanceof HTMLFormElement)) {
            return;
          }
          const submitter = event.submitter;
          const label =
            submitter?.dataset?.busyLabel ||
            form.dataset.busyLabel ||
            "";
          if (!label) {
            return;
          }
          setBusy(true, label);
        });

        window.addEventListener("pageshow", () => {
          if (busy) {
            return;
          }
          setBusy(false, "");
        });
      })();
    </script>
  </body>
</html>
